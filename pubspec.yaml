name: controle_patrimonio
description: Minimal Flutter app for controle-patrimonio
publish_to: none
version: 1.0.1+10
environment:
  sdk: ">=2.18.0 <3.0.0"
dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.0.5
  
  # Network & HTTP
  http: ^1.1.0
  dio: ^5.3.2
  connectivity_plus: ^5.0.1
  
  # Device info & storage
  package_info_plus: ^4.2.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Barcode scanner
  flutter_barcode_scanner: ^2.0.0
  audioplayers: ^5.2.1
  
  # File handling & installation
  open_filex: ^4.3.4
  permission_handler: ^10.4.5
  install_plugin: ^2.1.0
  
  # Utilities
  intl: ^0.18.1
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - pubspec.yaml
    - assets/sounds/beep.mp3
