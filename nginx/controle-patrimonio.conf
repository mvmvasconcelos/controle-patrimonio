
# Configuração para aplicação Flutter Web - Controle Patrimonial
location /controle-patrimonio/ {
    proxy_pass http://localhost:8090/controle-patrimonio/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    # Configurações específicas para Flutter
    proxy_set_header X-Forwarded-Host $host;
    proxy_redirect off;
    # Basic auth - protect development server
    auth_basic "Dev area - controle-patrimonio";
    auth_basic_user_file /home/ifsul/projects/controle-patrimonio/nginx/.htpasswd;
}
