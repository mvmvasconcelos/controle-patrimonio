version: '3.8'

services:
  flutter:
    build: .
    container_name: controle-patrimonio-flutter
    working_dir: /app
    volumes:
      - ./:/app:cached
      - gradle_cache:/root/.gradle
      - pub_cache:/root/.pub-cache
      - android_sdk:/opt/android-sdk
    ports:
      - "8090:8090"
    environment:
      TERM: xterm
      ANDROID_HOME: /opt/android-sdk
    stdin_open: true
    tty: true
    # Manter container vivo para execução de comandos
    command: ["sh", "-c", "tail -f /dev/null"]

  backend:
    build: ./backend
    container_name: controle-patrimonio-backend
    working_dir: /backend
    volumes:
      - ./backend:/backend
      - backend_data:/backend/data
    ports:
      - "6090:8000"
    environment:
      PYTHONUNBUFFERED: 1
    restart: unless-stopped

volumes:
  gradle_cache:
  pub_cache:
  android_sdk:
  backend_data:
